name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
    paths:
      - "preprocessing/**"
      - "california_housing_raw/**"
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 pandas==2.2.2 scikit-learn==1.5.2 matplotlib==3.9.2 seaborn==0.13.2

      - name: Run Preprocessing
        run: |
          cd preprocessing
          python automate_Athalie-Aurora.py

      - name: Upload Preprocessed Dataset
        uses: actions/upload-artifact@v4
        with:
          name: california_housing_preprocessing
          path: preprocessing/california_housing_preprocessing/

      - name: Commit Preprocessed Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preprocessing/california_housing_preprocessing/ california_housing_raw/ || true
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push || true
